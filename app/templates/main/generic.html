{% extends 'base.html' %}

{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="neo-card p-4">
                <h1 class="fw-bold mb-3 text-info">{{ title }}</h1>
                <hr class="border-secondary mb-3">
                
                <div class="lead text-light mb-3">
                    {{ content }}
                </div>
                
                <div class="bg-dark p-3 rounded border border-secondary">
                    <h5 class="text-muted mb-2"><i class="fas fa-info-circle me-2"></i> Note</h5>
                    <p class="small text-muted mb-0">
                        This is a standardized legal/informational page for the ManifestAir platform. 
                        If you have specific questions, please contact our support team directly.
                    </p>
                </div>

                <div class="mt-4">
                    <a href="{{ url_for('main.index') }}" class="btn btn-outline-light btn-sm">
                        <i class="fas fa-arrow-left me-2"></i> Back to Home
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
