{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="neo-card p-4">
            <h2 class="text-center mb-4">Reset Password</h2>
            <p class="text-muted text-center mb-4">Enter your email address and we'll send you a link to reset your password.</p>
            
            <div id="alert-box" class="alert d-none"></div>

            <form id="reset-form">
                <div class="mb-4">
                    <label class="form-label text-muted">Email Address</label>
                    <input type="email" id="email" class="neo-input" required>
                </div>
                <button type="submit" class="neo-btn w-100" id="reset-btn">
                    <span id="btn-text">Send Reset Link</span>
                    <span id="btn-spinner" class="spinner-border spinner-border-sm d-none"></span>
                </button>
            </form>

            <div class="text-center mt-3">
                <a href="{{ url_for('auth.login') }}" class="text-secondary small text-decoration-none">
                    <i class="fas fa-arrow-left me-1"></i> Back to Login
                </a>
            </div>
        </div>
    </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.8.0/firebase-app.js";
  import { getAuth, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/12.8.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAPBVYGu_VDd1h15MMOIQfdjExHUU7Ec6k",
    authDomain: "manifestair-df2fa.firebaseapp.com",
    projectId: "manifestair-df2fa",
    storageBucket: "manifestair-df2fa.firebasestorage.app",
    messagingSenderId: "368936646982",
    appId: "1:368936646982:web:b63c6f68baab65d706cd47",
    measurementId: "G-GC6T5FW96M"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  document.getElementById('reset-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      
      const alertBox = document.getElementById('alert-box');
      const btnText = document.getElementById('btn-text');
      const btnSpinner = document.getElementById('btn-spinner');

      // Loading State
      btnText.classList.add('d-none');
      btnSpinner.classList.remove('d-none');
      alertBox.classList.add('d-none');

      try {
          await sendPasswordResetEmail(auth, email);
          
          alertBox.textContent = "Check your email! A password reset link has been sent.";
          alertBox.className = "alert alert-success";
          alertBox.classList.remove('d-none');
          document.getElementById('reset-form').reset();
          
      } catch (error) {
          console.error(error);
          let msg = "Failed to send email. Check the address.";
          if (error.code === 'auth/user-not-found') msg = "No account found with that email.";
          
          alertBox.textContent = msg;
          alertBox.className = "alert alert-danger";
          alertBox.classList.remove('d-none');
      } finally {
          btnText.classList.remove('d-none');
          btnSpinner.classList.add('d-none');
      }
  });
</script>
{% endblock %}
